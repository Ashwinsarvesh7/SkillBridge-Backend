spring.application.name=skillbridge-backend
spring.config.import=optional:classpath:application-local.properties
server.port=8080
server.servlet.context-path=/api

# Spring Profiles
# Default profile: mysql (local development)
# For production: use spring.profiles.active=postgres
# Can also be set via environment variable: SPRING_PROFILES_ACTIVE=postgres
spring.profiles.active=${SPRING_PROFILES_ACTIVE:mysql}

# Common JPA Configuration (profile-specific database properties in application-mysql.properties and application-postgres.properties)
spring.jpa.open-in-view=false

# JWT
skillbridge.jwt.secret=${JWT_SECRET}
skillbridge.jwt.expiration-ms=86400000

# CORS
skillbridge.cors.allowed-origins=http://localhost:4200,http://localhost:4300

# Email (configure for production)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
skillbridge.mail.enabled=false
skillbridge.mail.from=noreply@skillbridge.com

# File upload
spring.servlet.multipart.max-file-size=5MB
skillbridge.upload.dir=uploads
